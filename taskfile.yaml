---
version: 3
tasks:
  cover_html:
    cmds:
      - go test -coverprofile=cover.out
      - go tool cover -html=cover.out -o cover.html
      - fish -c "open cover.html"
  clean: rm rss-feed-server.tar cover.html cover.out
  build:
    cmds:
      - docker build -t rss-feed-server .
      - docker image save localhost/rss-feed-server:latest > rss-feed-server.tar
